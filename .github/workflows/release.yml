name: Release

# Triggered by pushing a version tag (e.g. bump the version in package.json
# AND src-tauri/tauri.conf.json, commit, then `git tag v1.2.0 && git push
# origin v1.2.0`) - builds signed installers for Windows and Linux and
# publishes them as a draft GitHub Release. The release is created as a
# draft deliberately: review/edit the release notes and hit "Publish"
# yourself once you're happy with it - the in-app updater only ever sees
# published (non-draft) releases, so nothing reaches users until you do.
#
# check-version runs first and fails fast if the pushed tag doesn't match
# the version in both package.json and tauri.conf.json - catches a forgotten
# version bump before spending several minutes building on two platforms.
#
# Requires two repository secrets before this can sign anything:
#   TAURI_SIGNING_PRIVATE_KEY          - see README/docs for how to generate
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - the password used when generating it
# Without these set, tauri-action still builds but the artifacts won't be
# signed, and the in-app updater will refuse them.

on:
  push:
    tags:
      - 'v*.*.*'
  # Lets you manually re-run this against an existing tag ref (e.g. to
  # retry a release that failed for infra reasons) without needing to
  # delete and re-push the tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Cheap and runs first, so a forgotten version bump fails in seconds
  # instead of after several minutes of Windows/Linux builds.
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json and tauri.conf.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(jq -r .version package.json)
          TAURI_VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) doesn't match package.json's version ($PKG_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) doesn't match src-tauri/tauri.conf.json's version ($TAURI_VERSION)"
            exit 1
          fi
          echo "Version check passed: tag matches package.json and tauri.conf.json ($TAG_VERSION)"

  release-windows:
    needs: check-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FlashPad ${{ github.ref_name }}'
          releaseDraft: true
          generateReleaseNotes: true

      - name: Drop the "_en-US" locale suffix from the MSI's filename
        # tauri-bundler hardcodes {product}_{version}_{arch}_{language} for
        # the msi with no config to omit the locale segment, so this is a
        # post-upload rename instead: swap the just-uploaded asset for a
        # renamed copy, then patch the windows-x86_64 URL(s) inside the
        # release's already-uploaded latest.json to match. The signature
        # embedded in latest.json doesn't change - it's the file's content
        # hash, not its name, so only the url fields need fixing.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          OLD_MSI=$(basename "$(ls src-tauri/target/release/bundle/msi/*.msi)")
          NEW_MSI="${OLD_MSI/_en-US/}"

          if [ "$OLD_MSI" = "$NEW_MSI" ]; then
            echo "No _en-US suffix found in $OLD_MSI, nothing to rename"
            exit 0
          fi

          cp "src-tauri/target/release/bundle/msi/$OLD_MSI" "src-tauri/target/release/bundle/msi/$NEW_MSI"
          gh release upload "$TAG" "src-tauri/target/release/bundle/msi/$NEW_MSI" --clobber
          gh release delete-asset "$TAG" "$OLD_MSI" --yes

          gh release download "$TAG" --pattern latest.json --output latest.json --clobber
          sed -i "s#${OLD_MSI}#${NEW_MSI}#g" latest.json
          gh release upload "$TAG" latest.json --clobber

  release-linux:
    needs: check-version
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      # Same Fedora-container approach as build-linux.yml, so the .deb/.rpm
      # here are built against the same dnf package set a real Fedora user
      # would have - see that workflow for why.
      - name: Install system dependencies
        run: |
          dnf install -y \
            git gcc gcc-c++ make pkgconf-pkg-config \
            glib2-devel gtk3-devel webkit2gtk4.1-devel javascriptcoregtk4.1-devel \
            librsvg2-devel libappindicator-gtk3-devel \
            rpm-build file curl

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FlashPad ${{ github.ref_name }}'
          releaseDraft: true
          generateReleaseNotes: true
          args: --bundles deb,rpm
